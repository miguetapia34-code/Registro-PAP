<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro PAP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>📋 Registro Venta PAP</h2>

  <form id="formulario">

    //<input type="number" id="venta" placeholder="Nro Venta PAP" required>
    <input type="tel" id="sot" placeholder="N° SOT" inputmode="numeric" pattern="[0-9]*" required>
    	
    <!-- Combobox -->
    <select id="departamento" required></select>
    <select id="provincia" required></select>
    <select id="distrito" required></select>
    <select id="pdv" required></select>

  
    <select id="coordinador" required>
      <option value="">Seleccione Coordinador</option>
      <option value="Justo Lezcano">Justo Lezcano</option>
      <option value="Jhony Chau">Jhony Chau</option>
      <option value="Yurely Sierralta">Yurely Sierralta</option>
      <option value="Christopher Saucedo">Christopher Saucedo</option>
      <option value="Lizbeth Bazan">Lizbeth Bazan</option>
      <option value="Wilder Lescano">Wilder Lescano</option>
      <option value="Sugey Yahiro">Sugey Yahiro</option>
      <option value="Herbert Zevallos">Herbert Zevallos</option>
      <option value="Cristina Barron">Cristina Barron</option>
    </select>
    <input type="text" id="validacion" placeholder="Validación comercial">
    <input type="text" id="coordenadas" placeholder="Coordenadas (-lat,long)" readonly>
    <button type="button" onclick="obtenerUbicacion()">
   📍 Obtener ubicación
    </button>
    <input type="tel" id="contacto" placeholder="Contacto Cliente" inputmode="numeric" pattern="[0-9]*" required>
    
    <!-- ✅ Autorizado -->
    <input type="text" id="autorizado" placeholder="Autorizado">

    <!-- ✅ Campaña -->
    <select id="campania">
     <option value="PAP" selected>PAP</option>
     <option value="CARAVANA">CARAVANA</option>
    </select>

    <select id="biometrico" required>
    	<option value="OK">VALIDACIÓN BIOMETRICA: OK</option>
    	<option value="NO">VALIDACIÓN BIOMETRICA: NO</option>
    </select>


    <button type="submit">Enviar</button>

  </form>

  <h3>🧾 Plantilla:</h3>
  <pre id="resultado"></pre>
  <button id="btnCopiar" onclick="copiar()">📋 Copiar</button>

</div>

<script src="script.js"></script>
</body>
</html>
