<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro PAP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>📋 Registro Venta PAP</h2>

  <form id="formulario">

    <input type="number" id="venta" placeholder="Nro Venta PAP" required>
    <input type="text" id="sot" placeholder="N° SOT" required>
    	
    <!-- Combobox -->
    <select id="departamento" required></select>
    <select id="provincia" required></select>
    <select id="distrito" required></select>
    <select id="pdv" required></select>

     	
    <input type="text" id="coordinador" placeholder="Coordinador" required>
    <input type="text" id="validacion" placeholder="Validación comercial">
    <input type="text" id="coordenadas" placeholder="Coordenadas (-lat,long)">
    <input type="text" id="contacto" placeholder="Contacto Cliente" required>
    
    <!-- ✅ Autorizado -->
    <input type="text" id="autorizado" placeholder="Autorizado">

    <!-- ✅ Campaña -->
    <select id="campania">
     <option value="PAP" selected>PAP</option>
     <option value="CARAVANA">CARAVANA</option>
    </select>

    <select id="biometrico" required>
    	<option value="OK">VALIDACIÓN BIOMETRICA: OK</option>
    	<option value="NO">VALIDACIÓN BIOMETRICA: NO</option>
    </select>


    <button type="submit">Enviar</button>

  </form>

  <h3>🧾 Plantilla:</h3>
  <pre id="resultado"></pre>
  <button onclick="copiar()">📋 Copiar</button>

</div>

<script src="script.js"></script>
</body>
</html>
